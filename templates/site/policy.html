{% extends "site/base.html" %}
{% block title %}{{ title }} · {{ SITE_NAME }}{% endblock %}
{% block content %}
<section class="mx-auto max-w-3xl px-4 py-12 lg:px-8">
  <span class="section-eyebrow">{{ SITE_NAME }}</span>
  <h1 class="mt-2 font-display text-4xl font-semibold text-ink">{{ title }}</h1>
  <div class="prose mt-8 max-w-none leading-relaxed text-ink/80">{{ content|safe }}</div>
</section>
{% endblock %}
