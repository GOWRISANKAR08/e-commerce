{% extends "registration/_auth_base.html" %}
{% block title %}Admin Login · {{ SITE_NAME }}{% endblock %}
{% block form %}
<span class="inline-flex items-center gap-2 rounded-full bg-brand-50 px-3 py-1 text-xs font-bold uppercase tracking-wide text-brand-700">Admin Console</span>
<h1 class="mt-3 font-display text-3xl font-semibold text-ink">Sign in to manage {{ SITE_NAME }}</h1>
<p class="mt-2 text-ink/55">Restricted to administrator accounts.</p>

<form method="post" action="/admin-login" class="mt-8 space-y-4">
  {% csrf_token %}
  <label class="block text-sm"><span class="text-ink/60">Email or mobile</span>
    <input name="identifier" required autofocus
           class="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-200" /></label>
  <label class="block text-sm"><span class="text-ink/60">Password</span>
    <input name="password" type="password" required
           class="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-200" /></label>
  <button class="btn-primary w-full">Enter dashboard</button>
</form>

<p class="mt-6 text-center text-sm text-ink/55">
  Not an admin? <a href="/login" class="font-semibold text-brand-700 hover:underline">Customer login</a>
</p>
{% endblock %}
